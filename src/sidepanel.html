<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lib Downloader</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="app-header">
    <div class="logo">⬇</div>
    <div class="titles">
      <h1>Lib Downloader</h1>
      <span class="subtitle">RanobeLib · MangaLib · …</span>
    </div>
  </header>

  <main>
    <!-- Карточка книги / подсказка -->
    <section id="book-card" class="card book-card hidden">
      <img id="book-cover" class="cover" alt="" referrerpolicy="no-referrer">
      <div class="book-meta">
        <div id="book-title" class="book-title">—</div>
        <div id="book-sub" class="book-sub"></div>
        <span id="site-badge" class="badge"></span>
      </div>
    </section>

    <section id="empty-hint" class="card hint">
      <div class="hint-ico">📚</div>
      <p>Откройте страницу тайтла на RanobeLib, MangaLib или другом сайте
        группы&nbsp;Lib — панель подхватит книгу автоматически.</p>
    </section>

    <!-- Переводчик -->
    <section id="branch-section" class="card hidden">
      <label class="field-label" for="branch-select">Переводчик</label>
      <select id="branch-select" class="select"></select>
    </section>

    <!-- Главы -->
    <section id="chapters-section" class="card hidden">
      <div class="row between">
        <label class="field-label">Главы</label>
        <span id="selected-count" class="muted">0 выбрано</span>
      </div>

      <div class="row gap">
        <label class="check inline">
          <input type="checkbox" id="select-all"> <span>Выбрать всё</span>
        </label>
      </div>

      <div class="row gap range-row">
        <span class="muted">с</span>
        <input type="number" id="range-from" class="num" min="0" step="1" placeholder="1">
        <span class="muted">по</span>
        <input type="number" id="range-to" class="num" min="0" step="1" placeholder="∞">
        <button id="apply-range" class="btn ghost small">Применить</button>
      </div>

      <ul id="chapter-list" class="chapter-list"></ul>
      <p id="locked-note" class="note locked-note hidden"></p>
    </section>

    <!-- Форматы -->
    <section id="format-section" class="card hidden">
      <label class="field-label">Форматы экспорта</label>
      <div class="formats" id="formats"></div>
      <label class="check inline mt hidden" id="per-chapter-wrap">
        <input type="checkbox" id="txt-per-chapter"><span>TXT — отдельным файлом на главу</span>
      </label>
    </section>

    <!-- Настройки -->
    <section id="settings-section" class="card hidden">
      <button id="settings-toggle" class="settings-toggle" type="button">
        <span>Настройки</span><span class="chevron">⌄</span>
      </button>
      <div id="settings-body" class="settings-body hidden">
        <label class="set-row">
          <span>Лимит запросов/мин <span class="faint">0 = без лимита</span></span>
          <input type="number" id="set-rpm" class="num" min="0" step="10">
        </label>
        <label class="set-row">
          <span>Качество JPEG <span id="set-quality-val" class="muted"></span></span>
          <input type="range" id="set-quality" min="50" max="100" step="5" class="range">
        </label>
        <label class="check inline">
          <input type="checkbox" id="set-autocrop">
          <span>Резать длинные страницы манхвы (для читалок)</span>
        </label>
        <p class="dest-hint">Файлы сохраняются в <b>Загрузки / Lib Downloader / &lt;название&gt;</b></p>
      </div>
    </section>
  </main>

  <footer class="app-footer hidden" id="footer">
    <div id="progress-wrap" class="progress-wrap hidden">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <div id="status-line" class="status-line muted"></div>
    <button id="download-btn" class="btn primary" disabled>Скачать</button>
  </footer>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
